<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Profissional de Serviços</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📅 Agenda Profissional de Serviços</h1>

<div class="container">
<div class="resumo">
    <div>Total: <span id="total">0</span></div>
    <div>Pendentes: <span id="pendentes">0</span></div>
    <div>Em Andamento: <span id="andamento">0</span></div>
    <div>Concluídos: <span id="concluidos">0</span></div>
</div>
<h3>Novo Agendamento</h3>

<div class="grid">
    <input type="text" id="cliente" placeholder="Nome do Cliente">
    <input type="text" id="endereco" placeholder="Endereço">
    <input type="text" id="local" placeholder="Local do Serviço">
    <input type="date" id="data">
    <input type="time" id="hora">
    <input type="text" id="servico" placeholder="Serviço">
    <select id="status">
        <option value="Pendente">Pendente</option>
        <option value="Em Andamento">Em Andamento</option>
        <option value="Concluído">Concluído</option>
    </select>
</div>

<br>
<button onclick="salvarAgendamento()">Salvar</button>

<hr>

<h3>Filtros</h3>
<div class="grid">
    <input type="date" id="filtroData" onchange="listar()">
    <select id="filtroStatus" onchange="listar()">
        <option value="">Todos Status</option>
        <option value="Pendente">Pendente</option>
        <option value="Em Andamento">Em Andamento</option>
        <option value="Concluído">Concluído</option>
    </select>
    <input type="text" id="buscaCliente" placeholder="Buscar Cliente" onkeyup="listar()">
</div>

<div class="cards" id="lista"></div>

</div>

<script src="script.js"></script>
</body>
</html>
